<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場報告書作成</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1B4FD8;--blue2:#EEF3FF;--blue3:#C7D7FA;
  --dark:#0F1923;--mid:#3A4A5C;--sub:#6B7A8D;
  --bg:#F5F7FA;--card:#fff;
  --green:#16A34A;--green2:#DCFCE7;
  --red:#DC2626;--red2:#FEE2E2;
  --radius:14px;--radius-sm:10px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

#api-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.api-card{background:var(--card);border-radius:var(--radius);border:1.5px solid #E2E8F0;padding:32px 28px;max-width:420px;width:100%;}
.api-logo{font-size:40px;text-align:center;margin-bottom:12px;}
.api-title{font-size:22px;font-weight:900;color:var(--dark);text-align:center;margin-bottom:6px;}
.api-sub{font-size:13px;color:var(--sub);text-align:center;line-height:1.6;margin-bottom:24px;}
.api-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;margin-bottom:6px;}
.api-input{width:100%;font-family:'Noto Sans JP',sans-serif;font-size:13px;border:1.5px solid #E2E8F0;border-radius:var(--radius-sm);padding:12px 14px;color:var(--dark);outline:none;margin-bottom:8px;transition:border-color .2s;}
.api-input:focus{border-color:var(--blue);}
.api-hint{font-size:11px;color:var(--sub);margin-bottom:20px;line-height:1.6;}
.api-hint a{color:var(--blue);}
.api-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--blue);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.api-error{font-size:12px;color:var(--red);margin-top:8px;display:none;}

#main-app{display:none;}
.nav{background:var(--blue);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;padding:0 16px;}
.nav-logo{font-size:16px;font-weight:900;color:#fff;padding:14px 0;flex:1;}
.nav-tabs{display:flex;}
.nav-tab{padding:14px 12px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,0.65);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.nav-tab.active{color:#fff;border-bottom-color:#fff;}
.nav-key{font-size:11px;color:rgba(255,255,255,0.6);cursor:pointer;padding:14px 0 14px 10px;text-decoration:underline;}

.page{display:none;max-width:680px;margin:0 auto;padding:20px 16px 60px;}
.page.visible{display:block;}

.card{background:var(--card);border-radius:var(--radius);border:1.5px solid #E2E8F0;padding:20px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;}
.form-input,.form-select,.form-textarea{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;border:1.5px solid #E2E8F0;border-radius:var(--radius-sm);padding:10px 12px;background:#fff;color:var(--dark);transition:border-color .2s;outline:none;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.6;}

.area-item{border:1.5px solid #E2E8F0;border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;background:#FAFBFF;}
.area-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.area-title{font-size:12px;font-weight:700;color:var(--mid);}
.area-remove{border:none;background:none;color:#B0BAC9;cursor:pointer;font-size:20px;padding:0;line-height:1;}
.area-name-input{width:100%;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;border:1.5px solid #E2E8F0;border-radius:8px;padding:9px 12px;color:var(--dark);background:#fff;outline:none;margin-bottom:12px;}
.area-name-input:focus{border-color:var(--blue);}
.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.area-grid{grid-template-columns:1fr;}}
.ba-badge{font-size:11px;font-weight:800;padding:4px 12px;border-radius:50px;letter-spacing:.5px;display:inline-block;margin-bottom:8px;}
.ba-badge.before{background:var(--red2);color:var(--red);}
.ba-badge.after{background:var(--green2);color:var(--green);}
.ba-upload{border:2px dashed #E2E8F0;border-radius:var(--radius-sm);aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;background:#FAFAFA;transition:all .2s;}
.ba-upload:hover{border-color:var(--blue);background:var(--blue2);}
.ba-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.ba-preview{position:relative;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:4/3;}
.ba-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.ba-preview-remove{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.ba-preview-label{position:absolute;bottom:0;left:0;right:0;padding:5px 8px;font-size:10px;font-weight:700;text-align:center;}
.ba-preview-label.before{background:rgba(220,38,38,0.85);color:#fff;}
.ba-preview-label.after{background:rgba(22,163,74,0.85);color:#fff;}
.desc-textarea{width:100%;font-family:'Noto Sans JP',sans-serif;font-size:12px;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px 10px;color:var(--dark);background:#fff;outline:none;margin-top:8px;resize:vertical;min-height:60px;line-height:1.5;}
.desc-textarea:focus{border-color:var(--blue);}
.add-area-btn{width:100%;padding:11px;border:1.5px dashed var(--blue3);border-radius:var(--radius-sm);background:var(--blue2);color:var(--blue);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}

.gen-btn{width:100%;padding:16px;border:none;border-radius:var(--radius-sm);background:var(--blue);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;transition:all .2s;}
.gen-btn:hover{background:#1640B8;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}

.history-empty{text-align:center;padding:48px 20px;color:var(--sub);font-size:14px;}
.history-empty-icon{font-size:40px;margin-bottom:12px;}

.select-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);border:1.5px solid #E2E8F0;margin-bottom:12px;}
.select-bar-left{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--mid);cursor:pointer;}
.select-count{font-size:11px;color:var(--sub);}

.report-item{background:var(--card);border-radius:var(--radius);border:1.5px solid #E2E8F0;padding:16px 18px;margin-bottom:10px;transition:all .2s;}
.report-item.selected{border-color:var(--blue);background:var(--blue2);}
.report-item-row{display:flex;align-items:flex-start;gap:12px;}
.report-checkbox{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-top:3px;}
.report-info{flex:1;}
.report-title{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:3px;}
.report-meta{font-size:11px;color:var(--sub);margin-bottom:5px;}
.report-area-names{font-size:11px;color:var(--sub);}
.report-actions{display:flex;gap:6px;margin-top:10px;}
.small-btn{padding:5px 12px;border:1.5px solid #E2E8F0;border-radius:50px;background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.small-btn:hover{background:var(--blue2);border-color:var(--blue3);}
.small-btn.danger{color:var(--red);}
.small-btn.danger:hover{background:var(--red2);border-color:var(--red);}

.mail-card{display:none;}
.email-body-area{width:100%;min-height:300px;font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.9;border:1.5px solid #E2E8F0;border-radius:8px;padding:12px;color:var(--dark);outline:none;resize:vertical;background:#fff;margin-bottom:12px;}
.email-body-area:focus{border-color:var(--blue);}
.copy-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--green);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.copy-btn:hover{background:#15803D;}
.pdf-dl-btn{width:100%;padding:13px;border:1.5px solid var(--blue3);border-radius:var(--radius-sm);background:var(--blue2);color:var(--blue);font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.pdf-dl-btn:hover{background:#dce9ff;}
.note-text{font-size:11px;color:var(--sub);margin-top:8px;text-align:center;line-height:1.6;}

.loading-dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#fff;margin:0 3px;animation:ld .9s infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes ld{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>

<!-- API Screen -->
<div id="api-screen">
  <div class="api-card">
    <div class="api-logo">🏗️</div>
    <div class="api-title">現場報告書作成</div>
    <div class="api-sub">はじめにAnthropic APIキーを入力してください。<br>キーはこのブラウザにのみ保存されます。</div>
    <div class="api-label">APIキー</div>
    <input class="api-input" type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <div class="api-hint">APIキーは <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得できます。</div>
    <button class="api-btn" onclick="saveApiKey()">はじめる →</button>
    <div class="api-error" id="api-error"></div>
  </div>
</div>

<!-- Main App -->
<div id="main-app">
  <div class="nav">
    <div class="nav-inner">
      <div class="nav-logo">🏗️ 現場報告</div>
      <div class="nav-tabs">
        <button class="nav-tab active" id="tab-create" onclick="showPage('create')">作成</button>
        <button class="nav-tab" id="tab-history" onclick="showPage('history')">履歴・メール</button>
      </div>
      <span class="nav-key" onclick="resetKey()">🔑</span>
    </div>
  </div>

  <!-- 作成ページ -->
  <div class="page visible" id="page-create">
    <div style="height:16px;"></div>

    <div class="card">
      <div class="card-title">📋 基本情報</div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">現場名・工事名</div><input class="form-input" id="site-name" placeholder="例：トレ・パーチェ一宮 4月定期清掃" type="text"></div>
        <div class="form-group"><div class="form-label">作業日</div><input class="form-input" id="report-date" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">報告者名</div><input class="form-input" id="reporter" placeholder="例：檜垣" type="text"></div>
        <div class="form-group"><div class="form-label">メールのトーン</div>
          <select class="form-select" id="tone"><option>丁寧・フォーマル</option><option>簡潔・ビジネス</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">取引先メールアドレス</div><input class="form-input" id="recipient-email" placeholder="例：tanaka@example.com" type="email"></div>
        <div class="form-group"><div class="form-label">宛先名（会社名・担当者名）</div><input class="form-input" id="recipient-name" placeholder="例：三和住宅株式会社 御中" type="text"></div>
      </div>
      <div class="form-row">
        <div class="form-group full"><div class="form-label">CCアドレス（任意）</div><input class="form-input" id="cc-email" placeholder="例：boss@example.com" type="email"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔨 施工前後の変化</div>
      <div id="areas-container"></div>
      <button class="add-area-btn" onclick="addArea()">＋ 箇所を追加</button>
    </div>

    <div class="card">
      <div class="card-title">📝 特記事項（任意）</div>
      <textarea class="form-textarea" id="notes" placeholder="例：各箇所とも大きな損傷等は確認されませんでした。次回定期清掃は7月を予定。"></textarea>
    </div>

    <button class="gen-btn" onclick="savePDF()">📄 PDF報告書を出力・保存</button>
  </div>

  <!-- 履歴・メールページ -->
  <div class="page" id="page-history">
    <div style="height:16px;"></div>

    <div id="select-bar" class="select-bar" style="display:none;">
      <label class="select-bar-left">
        <input type="checkbox" id="select-all-cb" onchange="toggleSelectAll(this.checked)" style="width:16px;height:16px;accent-color:var(--blue);">
        全て選択
      </label>
      <span class="select-count" id="select-count"></span>
    </div>

    <div id="reports-list"></div>

    <div id="mail-section" style="display:none;">
      <div class="card">
        <div class="card-title">✉️ メール文章を生成</div>
        <button class="gen-btn" id="mail-gen-btn" onclick="generateEmail()" style="margin-bottom:0;">✉️ 選択したレポートのメール文を生成</button>
      </div>
      <div class="card mail-card" id="mail-result-card">
        <div class="card-title" style="color:var(--green);">✅ メール文章が生成されました</div>
        <textarea class="email-body-area" id="email-body-out"></textarea>
        <button class="copy-btn" onclick="copyEmailBody()">📋 メール文章をコピー</button>
        <button class="pdf-dl-btn" onclick="downloadSelectedPDFs()">📄 選択したPDFをダウンロード</button>
        <div class="note-text">ダウンロードしたPDFをメールに添付してお送りください</div>
      </div>
    </div>
  </div>
</div>

<script>
let areas = [];
let areaCounter = 0;

// --- API Key ---
function saveApiKey(){
  const key = document.getElementById('api-key-input').value.trim();
  const err = document.getElementById('api-error');
  if(!key || !key.startsWith('sk-')){err.style.display='block';err.textContent='正しいAPIキーを入力してください（sk- で始まります）';return;}
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('api-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  initApp();
}
function resetKey(){if(confirm('APIキーをリセットしますか？')){localStorage.removeItem('anthropic_api_key');location.reload();}}
document.getElementById('api-key-input').addEventListener('keydown', e=>{if(e.key==='Enter') saveApiKey();});

function initApp(){
  document.getElementById('report-date').value = new Date().toISOString().split('T')[0];
  if(!areas.length) addArea();
}

window.onload = ()=>{
  if(localStorage.getItem('anthropic_api_key')){
    document.getElementById('api-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initApp();
  }
};

// --- Nav ---
function showPage(p){
  ['create','history'].forEach(n=>{
    document.getElementById('page-'+n).classList.toggle('visible', n===p);
    document.getElementById('tab-'+n).classList.toggle('active', n===p);
  });
  if(p==='history') renderReports();
}

// --- Areas ---
function addArea(){
  const id = areaCounter++;
  areas.push({id, name:'', beforeImg:null, beforeDesc:'', afterImg:null, afterDesc:''});
  renderAreas();
}

function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAreas(){
  const c = document.getElementById('areas-container');
  if(!areas.length){c.innerHTML='';return;}
  c.innerHTML = areas.map((a, idx)=>`
    <div class="area-item">
      <div class="area-header">
        <div class="area-title">箇所 ${idx+1}</div>
        <button class="area-remove" onclick="removeArea(${a.id})">×</button>
      </div>
      <input class="area-name-input" type="text" placeholder="箇所名（例：駐車場部分）" value="${escHtml(a.name)}" oninput="updateAreaField(${a.id},'name',this.value)">
      <div class="area-grid">
        <div>
          <span class="ba-badge before">BEFORE</span>
          ${a.beforeImg
            ? `<div class="ba-preview"><img src="${a.beforeImg.dataUrl}"><button class="ba-preview-remove" onclick="clearImg(${a.id},'before')">✕</button><div class="ba-preview-label before">施工前</div></div>`
            : `<div class="ba-upload"><input type="file" accept="image/*" onchange="handleImg(event,${a.id},'before')"><div style="font-size:22px;margin-bottom:4px;">📷</div><div style="font-size:11px;font-weight:700;color:var(--sub);">施工前写真</div></div>`
          }
          <textarea class="desc-textarea" placeholder="施工前の状況を入力..." oninput="updateAreaField(${a.id},'beforeDesc',this.value)">${escHtml(a.beforeDesc)}</textarea>
        </div>
        <div>
          <span class="ba-badge after">AFTER</span>
          ${a.afterImg
            ? `<div class="ba-preview"><img src="${a.afterImg.dataUrl}"><button class="ba-preview-remove" onclick="clearImg(${a.id},'after')">✕</button><div class="ba-preview-label after">施工後</div></div>`
            : `<div class="ba-upload"><input type="file" accept="image/*" onchange="handleImg(event,${a.id},'after')"><div style="font-size:22px;margin-bottom:4px;">📷</div><div style="font-size:11px;font-weight:700;color:var(--sub);">施工後写真</div></div>`
          }
          <textarea class="desc-textarea" placeholder="施工後の状況を入力..." oninput="updateAreaField(${a.id},'afterDesc',this.value)">${escHtml(a.afterDesc)}</textarea>
        </div>
      </div>
    </div>`).join('');
}

function removeArea(id){areas = areas.filter(a=>a.id!==id); renderAreas();}
function updateAreaField(id, field, val){const a=areas.find(a=>a.id===id); if(a) a[field]=val;}

function handleImg(e, id, type){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const a = areas.find(a=>a.id===id);
    if(a){a[type+'Img']={base64:ev.target.result.split(',')[1], dataUrl:ev.target.result, mtype:file.type}; renderAreas();}
  };
  reader.readAsDataURL(file);
}
function clearImg(id, type){const a=areas.find(a=>a.id===id); if(a){a[type+'Img']=null; renderAreas();}}

// --- Save & PDF ---
function savePDF(){
  const siteName = document.getElementById('site-name').value.trim() || '現場';
  const date = document.getElementById('report-date').value;
  const reporter = document.getElementById('reporter').value.trim() || '担当者';
  const recipientEmail = document.getElementById('recipient-email').value.trim();
  const recipientName = document.getElementById('recipient-name').value.trim();
  const ccEmail = document.getElementById('cc-email').value.trim();
  const tone = document.getElementById('tone').value;
  const notes = document.getElementById('notes').value.trim();
  const dateStr = date ? new Date(date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '';

  const report = {
    id: Date.now(),
    siteName, date, dateStr, reporter, recipientEmail, recipientName, ccEmail, tone, notes,
    savedAt: new Date().toISOString(),
    areas: areas.map(a=>({
      name: a.name,
      beforeImg: a.beforeImg ? {dataUrl: a.beforeImg.dataUrl} : null,
      afterImg: a.afterImg ? {dataUrl: a.afterImg.dataUrl} : null,
      beforeDesc: a.beforeDesc,
      afterDesc: a.afterDesc
    }))
  };

  try{
    const reports = getReports();
    reports.unshift(report);
    if(reports.length > 30) reports.pop();
    localStorage.setItem('reports', JSON.stringify(reports));
  }catch(e){
    alert('ストレージ容量不足のため保存できませんでした。古いレポートを削除してください。');
    return;
  }

  openPrintWindow(report);

  if(confirm('報告書を保存しました！フォームをリセットしますか？')){
    resetForm();
  }
}

function resetForm(){
  document.getElementById('site-name').value = '';
  document.getElementById('report-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('reporter').value = '';
  document.getElementById('recipient-email').value = '';
  document.getElementById('recipient-name').value = '';
  document.getElementById('cc-email').value = '';
  document.getElementById('notes').value = '';
  areas = []; areaCounter = 0; addArea();
}

// --- Reports Storage ---
function getReports(){return JSON.parse(localStorage.getItem('reports') || '[]');}

// --- Reports Render ---
function renderReports(){
  const reports = getReports();
  const list = document.getElementById('reports-list');
  const selectBar = document.getElementById('select-bar');
  const mailSection = document.getElementById('mail-section');

  if(!reports.length){
    list.innerHTML = `<div class="history-empty"><div class="history-empty-icon">📋</div>まだ報告書がありません。<br>「作成」タブから報告書を作成してください。</div>`;
    selectBar.style.display = 'none';
    mailSection.style.display = 'none';
    return;
  }

  selectBar.style.display = 'flex';
  mailSection.style.display = 'block';

  list.innerHTML = reports.map(r=>{
    const d = new Date(r.savedAt);
    const ds = d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    const areaNames = r.areas.map(a=>a.name||'（名称なし）').join('、');
    return `<div class="report-item" id="ri-${r.id}">
      <div class="report-item-row">
        <input type="checkbox" class="report-checkbox" onchange="updateSelection()" data-id="${r.id}">
        <div class="report-info">
          <div class="report-title">🏗️ ${r.siteName}</div>
          <div class="report-meta">📅 ${r.dateStr||r.date} ｜ 👤 ${r.reporter} ｜ 📍 ${r.areas.length}箇所</div>
          <div class="report-area-names">${areaNames}</div>
          <div class="report-actions">
            <button class="small-btn" onclick="rePDF(${r.id})">📄 PDF再出力</button>
            <button class="small-btn danger" onclick="deleteReport(${r.id})">🗑️ 削除</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  updateSelection();
}

function updateSelection(){
  const allCbs = document.querySelectorAll('.report-checkbox');
  const checked = document.querySelectorAll('.report-checkbox:checked');
  const count = checked.length;
  const total = allCbs.length;
  document.getElementById('select-count').textContent = `${count}/${total} 件選択中`;
  const allCb = document.getElementById('select-all-cb');
  allCb.checked = count === total && total > 0;
  allCb.indeterminate = count > 0 && count < total;
  allCbs.forEach(cb=>{
    const item = cb.closest('.report-item');
    if(item) item.classList.toggle('selected', cb.checked);
  });
  const mailGenBtn = document.getElementById('mail-gen-btn');
  if(mailGenBtn) mailGenBtn.disabled = count === 0;
}

function toggleSelectAll(checked){
  document.querySelectorAll('.report-checkbox').forEach(cb=>cb.checked=checked);
  updateSelection();
}

function deleteReport(id){
  if(!confirm('この報告書を削除しますか？')) return;
  localStorage.setItem('reports', JSON.stringify(getReports().filter(r=>r.id!==id)));
  document.getElementById('mail-result-card').style.display = 'none';
  renderReports();
}

function rePDF(id){
  const r = getReports().find(r=>r.id===id);
  if(r) openPrintWindow(r);
}

// --- Email Generation ---
async function generateEmail(){
  const apiKey = localStorage.getItem('anthropic_api_key');
  if(!apiKey){resetKey();return;}
  const selected = Array.from(document.querySelectorAll('.report-checkbox:checked')).map(cb=>Number(cb.dataset.id));
  if(!selected.length){alert('レポートを1件以上選択してください');return;}
  const reports = getReports().filter(r=>selected.includes(r.id));

  const btn = document.getElementById('mail-gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  const first = reports[0];
  const reportSummaries = reports.map((r, i)=>{
    const areaSummary = r.areas.map(a=>`  【${a.name||'箇所'}】\n  施工前：${a.beforeDesc||'（記載なし）'}\n  施工後：${a.afterDesc||'（記載なし）'}`).join('\n');
    return `■ 報告書${i+1}：${r.siteName}（${r.dateStr||r.date}）\n${areaSummary}${r.notes?'\n  特記事項：'+r.notes:''}`;
  }).join('\n\n');

  const prompt = `あなたは建設・管理会社の現場担当者です。以下の現場報告書の内容をもとに、取引先への送付メールの本文を作成してください。

【宛先】${first.recipientName||'ご担当者様'}
【報告者】${first.reporter}
【トーン】${first.tone||'丁寧・フォーマル'}
【報告内容】
${reportSummaries}

【出力ルール】
- 件名は出力しないでください。本文のみ出力してください。
- 冒頭の挨拶（宛先名を使う）
- 各報告書の概要を簡潔にまとめる
- 「別添の報告書をご確認ください」旨を含める
- 特記事項があれば触れる
- 結びの挨拶と署名（報告者名を使用）
- 改行を適切に使い読みやすく整えてください`;

  let bodyText = '';
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1200, messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    bodyText = data.error ? 'エラー: '+data.error.message : data.content.map(c=>c.text||'').join('');
  }catch(e){bodyText='エラーが発生しました。APIキーとネットワーク接続をご確認ください。';}

  document.getElementById('email-body-out').value = bodyText;
  const resultCard = document.getElementById('mail-result-card');
  resultCard.style.display = 'block';
  resultCard.scrollIntoView({behavior:'smooth', block:'start'});
  btn.disabled = false;
  btn.innerHTML = '✉️ 選択したレポートのメール文を生成';
}

function copyEmailBody(){
  const text = document.getElementById('email-body-out').value;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ コピーしました！';
    setTimeout(()=>btn.innerHTML='📋 メール文章をコピー', 2000);
  });
}

function downloadSelectedPDFs(){
  const selected = Array.from(document.querySelectorAll('.report-checkbox:checked')).map(cb=>Number(cb.dataset.id));
  const reports = getReports().filter(r=>selected.includes(r.id));
  if(!reports.length){alert('レポートを選択してください');return;}
  reports.forEach((r, i)=>setTimeout(()=>openPrintWindow(r), i*800));
}

// --- PDF Generation ---
function buildReportHTML(r){
  const areasHTML = r.areas.map((a, idx)=>`
    <div class="pdf-area">
      <div class="pdf-area-title">【${a.name||`箇所${idx+1}`}】</div>
      <div class="pdf-ba-grid">
        <div class="pdf-ba-slot">
          <div class="pdf-ba-label before">BEFORE　施工前</div>
          ${a.beforeImg ? `<img class="pdf-ba-img" src="${a.beforeImg.dataUrl}">` : '<div class="pdf-ba-no-img">写真なし</div>'}
          ${a.beforeDesc ? `<div class="pdf-desc">${a.beforeDesc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>` : ''}
        </div>
        <div class="pdf-ba-slot">
          <div class="pdf-ba-label after">AFTER　施工後</div>
          ${a.afterImg ? `<img class="pdf-ba-img" src="${a.afterImg.dataUrl}">` : '<div class="pdf-ba-no-img">写真なし</div>'}
          ${a.afterDesc ? `<div class="pdf-desc">${a.afterDesc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>` : ''}
        </div>
      </div>
    </div>`).join('');

  return `<div class="pdf-page">
    <div class="pdf-header">
      <div class="pdf-header-title">現場作業報告書</div>
      <div class="pdf-header-meta">
        <span>現場名：${r.siteName}</span>
        <span>作業日：${r.dateStr||r.date}</span>
        <span>報告者：${r.reporter}</span>
      </div>
    </div>
    ${r.recipientName ? `<div class="pdf-to">提出先：${r.recipientName}</div>` : ''}
    <div class="pdf-section">
      <div class="pdf-section-title">■ 施工前後の変化</div>
      ${areasHTML}
    </div>
    ${r.notes ? `<div class="pdf-section"><div class="pdf-section-title">■ 特記事項</div><div class="pdf-notes">${r.notes.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div></div>` : ''}
    <div class="pdf-footer">
      <span>${r.siteName}</span>
      <span>報告者：${r.reporter}</span>
      <span>${r.dateStr||r.date}</span>
    </div>
  </div>`;
}

function openPrintWindow(r){
  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;color:#0F1923;}
    .pdf-page{padding:28px 32px;}
    .pdf-header{border-bottom:3px solid #1B4FD8;padding-bottom:14px;margin-bottom:20px;}
    .pdf-header-title{font-size:20px;font-weight:900;color:#1B4FD8;margin-bottom:6px;}
    .pdf-header-meta{font-size:12px;color:#6B7A8D;display:flex;gap:20px;flex-wrap:wrap;}
    .pdf-to{font-size:13px;color:#0F1923;margin-bottom:16px;}
    .pdf-section{margin-bottom:20px;}
    .pdf-section-title{font-size:14px;font-weight:700;color:#1B4FD8;border-left:4px solid #1B4FD8;padding-left:10px;margin-bottom:14px;}
    .pdf-area{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #E2E8F0;}
    .pdf-area:last-child{border-bottom:none;}
    .pdf-area-title{font-size:13px;font-weight:700;color:#3A4A5C;margin-bottom:10px;}
    .pdf-ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .pdf-ba-label{font-size:10px;font-weight:800;padding:3px 10px;border-radius:50px;display:inline-block;margin-bottom:6px;}
    .pdf-ba-label.before{background:#FEE2E2;color:#DC2626;}
    .pdf-ba-label.after{background:#DCFCE7;color:#16A34A;}
    .pdf-ba-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;display:block;margin-bottom:6px;}
    .pdf-ba-no-img{width:100%;aspect-ratio:4/3;background:#F5F5F5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#B0BAC9;margin-bottom:6px;}
    .pdf-desc{font-size:12px;color:#3A4A5C;line-height:1.7;}
    .pdf-notes{font-size:12px;color:#3A4A5C;line-height:1.8;}
    .pdf-footer{border-top:1px solid #E2E8F0;padding-top:10px;margin-top:20px;font-size:11px;color:#6B7A8D;display:flex;justify-content:space-between;}
  `;
  const html = `<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>${r.siteName} 報告書</title>
    <style>${css}</style>
  </head><body>${buildReportHTML(r)}</body></html>`;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  if(w){
    w.onload = ()=>{ w.focus(); setTimeout(()=>{ w.print(); URL.revokeObjectURL(url); }, 500); };
  } else {
    alert('ポップアップがブロックされました。ブラウザのポップアップ許可設定をご確認ください。');
    URL.revokeObjectURL(url);
  }
}
</script>
</body>
